name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Deploy to EdgeOne Pages
        run: |
          echo "🚀 Deploying static site..."
          echo "Project: 皖美信用平台 (CreditAgent7)"
          echo "Files ready in frontend/ directory"
          ls -la frontend/
          
      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | CreditAgent7 (皖美信用) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Files deployed successfully |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date) |" >> $GITHUB_STEP_SUMMARY
