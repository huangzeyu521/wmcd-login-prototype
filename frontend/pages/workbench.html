<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>我的工作台 - 皖美信用</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<link rel="stylesheet" href="../assets/css/shared.css?v=p3.1">
<link rel="stylesheet" href="../assets/css/mvp.css?v=p3.1">
<link rel="stylesheet" href="../assets/css/ai.css?v=p3.1">
<script src="../assets/js/shared.js?v=p3.1"></script>
<script src="../assets/js/interactions.js?v=p3.1"></script>
<script src="../assets/js/mock-data.js?v=p3.1"></script>
<script src="../assets/js/auth.js?v=p3.1"></script>
<script src="../assets/js/tickets.js?v=p3.1"></script>
<script src="../assets/js/phase2.js?v=p3.1"></script>
<script src="../assets/js/components.js?v=p3.1"></script>
<script src="../assets/js/ai-client.js?v=p3.1"></script>
</head>
<body class="bg-wm-bg">

<script>
// 守卫：未登录跳转登录
if (!window.WM_AUTH.guard()) throw new Error('not logged in');
</script>

<div id="topbar-root"></div>
<script>document.getElementById('topbar-root').outerHTML = WM_C.renderAuthTopbar('workbench');</script>

<!-- 欢迎语 + 角色化 Hero -->
<div style="background:linear-gradient(135deg, rgba(15,42,86,0.04), rgba(184,20,26,0.03));border-bottom:1px solid var(--color-border);">
    <div class="px-8 py-6 flex items-center justify-between max-w-[1600px] mx-auto">
        <div>
            <div class="text-xs text-wm-gray3 tracking-widest mb-1" id="greet-time">早上好</div>
            <h1 class="text-2xl font-bold text-wm-secondary" id="greet-name">加载中…</h1>
            <div class="text-sm text-wm-gray mt-1" id="greet-desc"></div>
        </div>
        <div class="flex gap-2">
            <button class="wm-btn wm-btn-ghost wm-btn-sm" onclick="window.location.href='my-tickets.html'">📁 我的申请</button>
            <button class="wm-btn wm-btn-gold wm-btn-sm" onclick="window.location.href='messages.html'">🔔 消息中心</button>
        </div>
    </div>
</div>

<main class="px-8 py-6 max-w-[1600px] mx-auto">

    <!-- 顶部 KPI（根据角色差异化）-->
    <div class="grid grid-cols-5 gap-4 mb-6" id="kpi-bar"></div>

    <!-- 主内容两列 -->
    <div class="grid grid-cols-12 gap-5">
        <!-- 左：待办 + 我发起的 -->
        <div class="col-span-8 space-y-5">
            <!-- 今日待办 -->
            <div class="wm-card">
                <div class="wm-card-header">
                    <h3>今日待办</h3>
                    <a href="todos.html" class="text-xs text-wm-primary hover:underline">查看全部 →</a>
                </div>
                <div class="p-4 space-y-2" id="todos-list">
                    <div class="wm-empty"><div class="empty-icon">✨</div><div class="empty-title">暂无待办</div><div class="empty-desc">所有任务已处理完毕</div></div>
                </div>
            </div>

            <!-- 我最近的单据 -->
            <div class="wm-card">
                <div class="wm-card-header">
                    <h3>我的在办单据</h3>
                    <a href="my-tickets.html" class="text-xs text-wm-primary hover:underline">查看全部 →</a>
                </div>
                <div class="p-4 space-y-3" id="my-tickets-list"></div>
            </div>
        </div>

        <!-- 右：快速操作 + 消息 + 角色信息 -->
        <div class="col-span-4 space-y-5">
            <!-- 快速操作九宫格 -->
            <div class="wm-card">
                <div class="wm-card-header">
                    <h3>⚡ 快速操作</h3>
                </div>
                <div class="p-4" id="quick-actions"></div>
            </div>

            <!-- 最新消息 -->
            <div class="wm-card">
                <div class="wm-card-header">
                    <h3>🔔 最新消息</h3>
                    <a href="messages.html" class="text-xs text-wm-primary hover:underline">全部 →</a>
                </div>
                <div id="msg-list" style="max-height:320px;overflow-y:auto;"></div>
            </div>

            <!-- 角色洞察 -->
            <div class="wm-card">
                <div class="wm-card-header">
                    <h3>🧭 为您推荐</h3>
                </div>
                <div class="p-4" id="role-insights"></div>
            </div>
        </div>
    </div>

</main>

<div id="footer-root"></div>
<script>document.getElementById('footer-root').outerHTML = renderFooter();</script>

<script>
(function(){
    const user = window.WM_AUTH.currentUser();
    const h = new Date().getHours();
    let greet = '您好';
    if (h < 6) greet = '夜深了'; else if (h < 11) greet = '早上好'; else if (h < 14) greet = '中午好'; else if (h < 18) greet = '下午好'; else greet = '晚上好';
    document.getElementById('greet-time').textContent = greet + ' · ' + new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
    document.getElementById('greet-name').innerHTML = `${user.shortName}，<span class="text-wm-primary">${greet}！</span>`;
    document.getElementById('greet-desc').textContent = `${user.roleLabel} · ${user.org}`;

    // 绑定角色切换下拉
    WM_C.bindRoleSwitcher();

    // ===== 角色化 KPI =====
    let kpi;
    if (user.role === 'sasac_chief' || user.role === 'sasac_officer') {
        kpi = [
            { color:'#D64045', label:'🔴 红色预警', val:'3', hint:'需立即处置' },
            { color:'#E8A33D', label:'🟠 橙色预警', val:'9', hint:'重点关注' },
            { color:'#B8141A', label:'待我督办', val:'2', hint:'跨集团' },
            { color:'#0F2A56', label:'全省覆盖国企', val:'1,248', hint:'↑ 23 家' },
            { color:'#2B9348', label:'处置闭环率', val:'96.8%', hint:'↑ 2.1pct' },
        ];
    } else if (user.role === 'soe_cfo') {
        kpi = [
            { color:'#B8141A', label:'本企业信用', val:'AAA', hint:'968 分' },
            { color:'#0F2A56', label:'综合融资成本', val:'4.28%', hint:'↓ 62bps' },
            { color:'#C9A063', label:'在办融资', val:'3', hint:'笔 · 本月' },
            { color:'#E8A33D', label:'到期债务(30日)', val:'38', hint:'亿元' },
            { color:'#2B9348', label:'盘活规模', val:'18', hint:'亿 · 进行中' },
        ];
    } else if (user.role === 'soe_strategy') {
        kpi = [
            { color:'#B8141A', label:'在投项目', val:'58', hint:'个' },
            { color:'#0F2A56', label:'投后异常', val:'3', hint:'预警关注' },
            { color:'#C9A063', label:'候选并购标的', val:'26', hint:'已筛选' },
            { color:'#1F4A8A', label:'综合IRR', val:'14.8%', hint:'↑ 2.3pct' },
            { color:'#2B9348', label:'本月退出', val:'4', hint:'个 · 2.8x' },
        ];
    } else if (user.role === 'soe_risk') {
        kpi = [
            { color:'#D64045', label:'待处置预警', val:'1', hint:'红色' },
            { color:'#E8A33D', label:'监控中风险', val:'7', hint:'橙+黄' },
            { color:'#B8141A', label:'督办回执', val:'2', hint:'待提交' },
            { color:'#0F2A56', label:'本月处置', val:'14', hint:'已闭环' },
            { color:'#2B9348', label:'处置时效', val:'3.2', hint:'日均' },
        ];
    } else if (user.role === 'soe_procurement') {
        kpi = [
            { color:'#B8141A', label:'在办招标', val:'5', hint:'个' },
            { color:'#E8A33D', label:'异常拦截', val:'1', hint:'围标嫌疑' },
            { color:'#0F2A56', label:'省级供应商库', val:'8,642', hint:'家' },
            { color:'#A8823E', label:'供应链金融', val:'28', hint:'亿 · 本月' },
            { color:'#2B9348', label:'中标签约', val:'12', hint:'本月' },
        ];
    } else if (user.role === 'soe_chairman') {
        kpi = [
            { color:'#B8141A', label:'待我审批', val:'3', hint:'重大事项' },
            { color:'#0F2A56', label:'本企业信用', val:'AAA', hint:'968 分' },
            { color:'#C9A063', label:'保值增值率', val:'108.3%', hint:'↑ 5.2pct' },
            { color:'#E8A33D', label:'风险关注', val:'2', hint:'经营异动' },
            { color:'#2B9348', label:'本年ROE', val:'12.8%', hint:'↑ 1.5pct' },
        ];
    } else {
        kpi = [
            { color:'#B8141A', label:'我的单据', val:'5', hint:'' },
            { color:'#0F2A56', label:'待办', val:'3', hint:'' },
            { color:'#C9A063', label:'消息', val:'2', hint:'未读' },
        ];
    }
    document.getElementById('kpi-bar').innerHTML = kpi.map(k => `
        <div class="wm-kpi-mini" style="--kpi-color:${k.color};">
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-value">${k.val}</div>
            <div class="kpi-trend">${k.hint}</div>
        </div>
    `).join('');

    // ===== 待办 =====
    const todos = window.WM_TICKETS.myTodos();
    if (todos.length) {
        document.getElementById('todos-list').innerHTML = todos.slice(0, 6).map(t => WM_C.todoItem(t)).join('');
    }

    // ===== 我的在办 =====
    const myTickets = window.WM_TICKETS.list({ mine: true }).filter(t =>
        t.status !== 'archived' && t.status !== 'completed'
    ).slice(0, 4);
    if (myTickets.length) {
        document.getElementById('my-tickets-list').innerHTML = myTickets.map(t => WM_C.ticketCard(t)).join('');
    } else {
        document.getElementById('my-tickets-list').innerHTML = `
            <div class="wm-empty"><div class="empty-icon">📋</div><div class="empty-title">暂无在办单据</div><div class="empty-desc">点击下方"快速操作"开启新业务</div></div>`;
    }

    // ===== 快速操作（角色化）=====
    let actions;
    if (user.role === 'sasac_chief' || user.role === 'sasac_officer') {
        actions = [
            { icon:'🧭', label:'监管驾驶舱', hint:'全省态势', url:'dashboard.html' },
            { icon:'📣', label:'下发督办', hint:'国企处置', url:'supervise-center.html' },
            { icon:'🚨', label:'风险处置', hint:'穿透分析', url:'agent-risk.html' },
            { icon:'⚙', label:'审批流配置', hint:'多级审批', url:'approval-config.html' },
        ];
    } else if (user.role === 'soe_cfo') {
        actions = [
            { icon:'💰', label:'发起融资', hint:'10大品类', url:'ticket-new.html?type=financing' },
            { icon:'🏗', label:'三资盘活', hint:'AI估值', url:'ticket-new.html?type=assets' },
            { icon:'🏛', label:'信用评估', hint:'季度/触发', url:'ticket-new.html?type=credit' },
            { icon:'📊', label:'融资看板', hint:'成本/结构', url:'agent-financing.html' },
        ];
    } else if (user.role === 'soe_strategy') {
        actions = [
            { icon:'📈', label:'投资尽调', hint:'Multi-Agent', url:'ticket-new.html?type=investment' },
            { icon:'🔗', label:'并购立项', hint:'补链强链', url:'ticket-new.html?type=ma' },
            { icon:'🔬', label:'产业研究', hint:'AI产研', url:'agent-investment.html' },
            { icon:'📊', label:'组合分析', hint:'IRR/退出', url:'agent-investment.html' },
        ];
    } else if (user.role === 'soe_risk') {
        actions = [
            { icon:'🛡', label:'处置预警', hint:'三穿透', url:'agent-risk.html' },
            { icon:'📣', label:'督办接单', hint:'省国资委', url:'supervise-center.html' },
            { icon:'⚖', label:'合规审查', hint:'32号令', url:'ticket-new.html?type=risk' },
            { icon:'📚', label:'档案中心', hint:'全文检索', url:'documents.html' },
        ];
    } else if (user.role === 'soe_procurement') {
        actions = [
            { icon:'🎯', label:'发布招标', hint:'智能评标', url:'ticket-new.html?type=supply' },
            { icon:'🏬', label:'供应商管理', hint:'五阶段', url:'agent-supply.html' },
            { icon:'💰', label:'供应链金融', hint:'3种模式', url:'agent-supply.html' },
            { icon:'⚠', label:'异常检测', hint:'围标排查', url:'agent-supply.html' },
        ];
    } else if (user.role === 'soe_chairman') {
        actions = [
            { icon:'✓', label:'待我审批', hint:'3 笔', url:'todos.html' },
            { icon:'📊', label:'企业看板', hint:'经营全景', url:'agent-credit.html' },
            { icon:'🧭', label:'监管驾驶舱', hint:'对标参考', url:'dashboard.html' },
            { icon:'📁', label:'单据中心', hint:'全企业', url:'my-tickets.html' },
        ];
    } else {
        actions = [
            { icon:'🏠', label:'工作台', hint:'', url:'workbench.html' },
        ];
    }
    document.getElementById('quick-actions').innerHTML = `<div class="wm-quick-actions">${
        actions.map(a => `
            <a href="${a.url}" class="wm-quick-action">
                <div class="qa-icon">${a.icon}</div>
                <div class="qa-label">${a.label}</div>
                <div class="qa-hint">${a.hint}</div>
            </a>
        `).join('')
    }</div>`;

    // ===== 消息 =====
    const msgs = window.WM_STORE.getMessages(user.id).slice(0, 5);
    const msgHtml = msgs.length ?
        msgs.map(m => WM_C.messageCard(m)).join('') :
        `<div class="wm-empty"><div class="empty-icon">📬</div><div class="empty-title">暂无消息</div></div>`;
    document.getElementById('msg-list').innerHTML = msgHtml;

    // ===== 角色洞察（智能建议）=====
    let insights;
    if (user.role === 'sasac_chief' || user.role === 'sasac_officer') {
        insights = [
            { icon:'💡', title:'XX建工担保圈风险', desc:'已识别 6 家关联国企，建议协调集中化解' },
            { icon:'📈', title:'全省融资成本下降', desc:'本月平均综合成本 4.28%，同比 ↓ 62bps' },
            { icon:'⚠', title:'3 家国企信用评级下滑', desc:'建议约谈并启动信用修复' },
        ];
    } else if (user.role === 'soe_cfo') {
        insights = [
            { icon:'💡', title:'绿色债券窗口期', desc:'近期利率处于低点，建议发行 20 亿' },
            { icon:'⏰', title:'下月有 3 笔债务到期', desc:'建议提前 60 天启动置换方案' },
            { icon:'📊', title:'短债占比偏高', desc:'当前 58%，建议优化至 50% 以下' },
        ];
    } else if (user.role === 'soe_strategy') {
        insights = [
            { icon:'🎯', title:'新能源三电赛道热度高', desc:'已匹配 26 个候选标的，Top5 协同度 ≥ 85' },
            { icon:'⚡', title:'合肥XX储能尽调进度', desc:'Multi-Agent 已完成 5/8，预计 42min' },
            { icon:'📈', title:'Q1 退出 4 个项目', desc:'平均回报 2.8x，优于基准 0.5x' },
        ];
    } else {
        insights = [
            { icon:'💡', title:'AI 助手已就绪', desc:'右下角 AI 按钮可随时呼出' },
            { icon:'📚', title:'新手引导', desc:'点击左侧菜单了解您的专属功能' },
        ];
    }
    document.getElementById('role-insights').innerHTML = `<div class="space-y-3">${
        insights.map(i => `
            <div class="flex items-start gap-2 p-3 rounded" style="background:linear-gradient(135deg, rgba(201,160,99,0.05), rgba(15,42,86,0.02));border-left:3px solid var(--color-accent);">
                <span class="text-lg flex-shrink-0">${i.icon}</span>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-wm-secondary">${i.title}</div>
                    <div class="text-xs text-wm-gray mt-1">${i.desc}</div>
                </div>
            </div>
        `).join('')
    }</div>`;
})();
</script>
</body>
</html>
