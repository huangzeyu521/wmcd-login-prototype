<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>我的申请 - 皖美信用</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/shared.css?v=p3.1">
<link rel="stylesheet" href="../assets/css/mvp.css?v=p3.1">
<link rel="stylesheet" href="../assets/css/ai.css?v=p3.1">
<script src="../assets/js/shared.js?v=p3.1"></script>
<script src="../assets/js/interactions.js?v=p3.1"></script>
<script src="../assets/js/mock-data.js?v=p3.1"></script>
<script src="../assets/js/auth.js?v=p3.1"></script>
<script src="../assets/js/tickets.js?v=p3.1"></script>
<script src="../assets/js/phase2.js?v=p3.1"></script>
<script src="../assets/js/components.js?v=p3.1"></script>
<script src="../assets/js/ai-client.js?v=p3.1"></script>
</head>
<body class="bg-wm-bg">

<script>if (!window.WM_AUTH.guard()) throw new Error('not logged in');</script>

<div id="topbar-root"></div>
<script>document.getElementById('topbar-root').outerHTML = WM_C.renderAuthTopbar('my-tickets');</script>

<main class="px-8 py-6 max-w-[1600px] mx-auto">
    <div class="flex items-center justify-between mb-5">
        <div>
            <h1 class="text-2xl font-bold text-wm-secondary">📁 我的申请</h1>
            <div class="text-xs text-wm-gray3 mt-1">单据全生命周期管理 · 起草 / 审批 / 执行 / 归档</div>
        </div>
        <div class="flex items-center gap-2">
            <input type="text" class="wm-input" id="search-input" placeholder="🔍 搜索单据标题或ID…" style="width:260px;">
            <button class="wm-btn wm-btn-primary wm-btn-sm" id="btn-new">＋ 新建单据</button>
        </div>
    </div>

    <!-- KPI 统计 -->
    <div class="grid grid-cols-5 gap-4 mb-5" id="stats-bar"></div>

    <!-- 类型 Tab -->
    <div class="mb-4">
        <div class="wm-tabs" id="type-tabs">
            <div class="wm-tab active" data-type="all">全部</div>
            <div class="wm-tab" data-type="credit">🏛 信用评估</div>
            <div class="wm-tab" data-type="financing">💰 融资</div>
            <div class="wm-tab" data-type="investment">📈 投资</div>
            <div class="wm-tab" data-type="assets">🏗 盘活</div>
            <div class="wm-tab" data-type="ma">🔗 并购</div>
            <div class="wm-tab" data-type="supply">🔄 招投标</div>
            <div class="wm-tab" data-type="risk">🛡 风控</div>
        </div>
    </div>

    <!-- 状态 Tab -->
    <div class="mb-5 flex items-center gap-2 text-xs">
        <span class="text-wm-gray3">状态：</span>
        <div class="wm-tabs" id="status-tabs" style="background:transparent;padding:0;">
            <div class="wm-tab active" data-status="all" style="border:1px solid var(--color-border);">全部</div>
            <div class="wm-tab" data-status="draft" style="border:1px solid var(--color-border);">草稿</div>
            <div class="wm-tab" data-status="reviewing,submitted" style="border:1px solid var(--color-border);">审批中</div>
            <div class="wm-tab" data-status="approved,executing" style="border:1px solid var(--color-border);">执行中</div>
            <div class="wm-tab" data-status="completed,archived" style="border:1px solid var(--color-border);">已完成</div>
            <div class="wm-tab" data-status="rejected" style="border:1px solid var(--color-border);">已驳回</div>
        </div>
    </div>

    <!-- 列表 -->
    <div class="wm-card">
        <div class="p-3" id="tickets-container">
            <div class="wm-empty"><div class="empty-icon">📁</div><div class="empty-title">加载中…</div></div>
        </div>
    </div>
</main>

<div id="footer-root"></div>
<script>document.getElementById('footer-root').outerHTML = renderFooter();</script>

<script>
const user = window.WM_AUTH.currentUser();
WM_C.bindRoleSwitcher();

let filterType = 'all';
let filterStatus = 'all';
let keyword = '';

function renderStats() {
    const stats = window.WM_TICKETS.stats();
    const items = [
        { label: '我发起的单据总数', val: stats.total, color: '#0F2A56' },
        { label: '进行中', val: stats.inProgress, color: '#E8A33D' },
        { label: '已完成/归档', val: stats.completed, color: '#2B9348' },
        { label: '被驳回', val: stats.rejected, color: '#D64045' },
        { label: '待我审批', val: stats.pendingApproval, color: '#B8141A' },
    ];
    document.getElementById('stats-bar').innerHTML = items.map(i => `
        <div class="wm-kpi-mini" style="--kpi-color:${i.color};">
            <div class="kpi-label">${i.label}</div>
            <div class="kpi-value">${i.val}</div>
        </div>
    `).join('');
}

function render() {
    const filter = { mine: true };
    if (filterType !== 'all') filter.type = filterType;
    if (filterStatus !== 'all') filter.status = filterStatus.split(',');
    if (keyword) filter.keyword = keyword;

    const list = window.WM_TICKETS.list(filter);
    const container = document.getElementById('tickets-container');
    if (!list.length) {
        container.innerHTML = `<div class="wm-empty"><div class="empty-icon">📭</div><div class="empty-title">暂无符合条件的单据</div><div class="empty-desc">点击右上角"新建单据"发起业务</div></div>`;
    } else {
        // 用数据表形式展示
        container.innerHTML = `
            <table class="wm-dtable">
                <thead>
                    <tr>
                        <th>单据ID/标题</th>
                        <th style="width:100px;">类型</th>
                        <th style="width:110px;">状态</th>
                        <th style="width:110px;">金额</th>
                        <th style="width:120px;">更新时间</th>
                        <th style="width:90px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${list.map(t => {
                        const meta = window.WM_TICKET_TYPES[t.type];
                        return `<tr onclick="location.href='ticket-detail.html?id=${t.id}'">
                            <td>
                                <div class="text-xs font-mono text-wm-gray3">${t.id}</div>
                                <div class="font-semibold text-wm-secondary mt-0.5">${WM_C.escapeHtml(t.title)}</div>
                            </td>
                            <td><span class="wm-tag" style="color:${meta.color};border-color:${meta.color}55;background:${meta.color}0a;">${meta.icon} ${meta.name}</span></td>
                            <td>${WM_C.statusBadge(t.status)} ${WM_C.priorityTag(t.priority)}</td>
                            <td class="font-mono">${t.amount ? WM_C.fmtMoney(t.amount) : '—'}</td>
                            <td class="text-xs font-mono text-wm-gray3">${WM_C.fmtTime(t.updatedAt)}</td>
                            <td>
                                <button class="wm-btn wm-btn-ghost wm-btn-sm" style="padding:3px 10px;" onclick="event.stopPropagation();location.href='ticket-detail.html?id=${t.id}'">查看 →</button>
                            </td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;
    }
}

// Tabs 绑定
document.querySelectorAll('#type-tabs .wm-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('#type-tabs .wm-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterType = tab.getAttribute('data-type');
        render();
    });
});
document.querySelectorAll('#status-tabs .wm-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('#status-tabs .wm-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        filterStatus = tab.getAttribute('data-status');
        render();
    });
});
document.getElementById('search-input').addEventListener('input', (e) => {
    keyword = e.target.value.trim();
    render();
});

// 新建按钮 → 选择类型
document.getElementById('btn-new').addEventListener('click', async () => {
    const body = `
        <p class="text-sm text-wm-gray mb-4">请选择要发起的单据类型：</p>
        <div class="grid grid-cols-2 gap-3" id="type-picker">
            ${Object.keys(window.WM_TICKET_TYPES).map(k => {
                const m = window.WM_TICKET_TYPES[k];
                return `<div class="wm-option-card" data-type="${k}">
                    <span style="font-size:22px;">${m.icon}</span>
                    <span class="font-semibold text-wm-secondary">${m.name}</span>
                </div>`;
            }).join('')}
        </div>`;
    const dlg = document.createElement('div');
    dlg.className = 'wm-modal-backdrop';
    dlg.innerHTML = `<div class="wm-modal"><div class="wm-modal-header"><div class="wm-modal-title">＋ 新建单据</div><div class="wm-modal-close">×</div></div><div class="wm-modal-body">${body}</div></div>`;
    document.body.appendChild(dlg);
    dlg.querySelector('.wm-modal-close').onclick = () => dlg.remove();
    dlg.addEventListener('click', e => { if (e.target === dlg) dlg.remove(); });
    dlg.querySelectorAll('[data-type]').forEach(el => {
        el.addEventListener('click', () => {
            const type = el.getAttribute('data-type');
            location.href = 'ticket-new.html?type=' + type;
        });
    });
});

renderStats();
render();
</script>
</body>
</html>
