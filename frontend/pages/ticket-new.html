const config = CONFIG[type];

document.getElementById('form-subtitle').textContent = config.subtitle;

// 状态
let currentStep = 0;
let formData = {};

// ========= 渲染步骤 =========
function renderSteps() {
    document.getElementById('steps-container').innerHTML = WM_C.wizardSteps(config.steps, currentStep);
}

// ========= 渲染表单 =========
function renderForm() {
    const fields = config.fields[currentStep] || [];
    const html = fields.map(f => renderField(f)).join('');
    document.getElementById('form-container').innerHTML = html;

    // 附加交互
    document.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', () => {
            formData[el.getAttribute('data-field')] = el.value;
        });
        el.addEventListener('change', () => {
            formData[el.getAttribute('data-field')] = el.value;
        });
    });

    // 多选卡片
    document.querySelectorAll('.multiselect-card').forEach(card => {
        card.addEventListener('click', () => {
            card.classList.toggle('selected');
            const name = card.getAttribute('data-name');
            const value = card.getAttribute('data-value');
            formData[name] = formData[name] || [];
            const idx = formData[name].indexOf(value);
            if (idx >= 0) formData[name].splice(idx, 1); else formData[name].push(value);
        });
    });

    // 方案选择器
    document.querySelectorAll('.plan-option').forEach(card => {
        card.addEventListener('click', () => {
            document.querySelectorAll('.plan-option').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            formData.selectedPlan = card.getAttribute('data-plan');
        });
    });
}

function renderField(f) {
    if (f.type === 'placeholder') {
        return `<div class="wm-form-group">
            <label class="wm-form-label">${f.label}</label>
            <div class="p-4 rounded" style="background:linear-gradient(135deg,rgba(201,160,99,0.06),rgba(15,42,86,0.03));border:1px dashed var(--color-accent);white-space:pre-line;color:var(--color-text-2);font-size:13px;">${f.text}</div>
        </div>`;
    }
    if (f.type === 'textarea') {
        return `<div class="wm-form-group">
            <label class="wm-form-label ${f.required ? 'required' : ''}">${f.label}</label>
            <textarea class="wm-textarea" data-field="${f.name}" placeholder="${f.placeholder || ''}" rows="3">${formData[f.name] || ''}</textarea>
            ${f.help ? `<div class="wm-form-help">${f.help}</div>` : ''}
        </div>`;
    }
    if (f.type === 'select') {
        const opts = f.options.map(o => {
            const val = o.includes('|') ? o.split('|')[0] : o;
            const lbl = o.includes('|') ? o.split('|')[1] : o;
            return `<option value="${val}">${lbl}</option>`;
        }).join('');
        return `<div class="wm-form-group">
            <label class="wm-form-label ${f.required ? 'required' : ''}">${f.label}</label>
            <select class="wm-select" data-field="${f.name}"><option value="">请选择…</option>${opts}</select>
            ${f.help ? `<div class="wm-form-help">${f.help}</div>` : ''}
        </div>`;
    }
    if (f.type === 'multiselect') {
        return `<div class="wm-form-group">
            <label class="wm-form-label ${f.required ? 'required' : ''}">${f.label}</label>
            <div class="grid grid-cols-3 gap-2">
                ${f.options.map(o => `
                    <div class="wm-option-card multiselect-card" data-name="${f.name}" data-value="${o}">
                        <span class="text-sm">${o}</span>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }
    if (f.type === 'plan-picker') {
        // 融资方案选择器
        const plans = [
            { id: 'A', title: '方案A · 公司债30亿 + 绿色债20亿', cost: '3.68%', pros: '综合成本最优 · 直接融资 · 绿色专项', badge: '推荐', color: '#C9A063' },
            { id: 'B', title: '方案B · 科创债30亿 + 银行项贷20亿', cost: '3.95%', pros: '科技属性突出 · 银企组合', badge: '备选', color: '#0F2A56' },
            { id: 'C', title: '方案C · REITs 25亿 + 中票25亿', cost: '4.12%', pros: '资产盘活联动 · 直接融资', badge: '备选', color: '#1F4A8A' },
        ];
        return `<div class="wm-form-group">
            <label class="wm-form-label required">${f.label}</label>
            <div class="space-y-3">
                ${plans.map(p => `
                    <div class="wm-option-card plan-option" data-plan="${p.id}" style="display:block;padding:16px;">
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-bold text-wm-secondary">${p.title}</span>
                            <span class="wm-badge" style="background:${p.color}20;color:${p.color};border:1px solid ${p.color}55;">${p.badge}</span>
                        </div>
                        <div class="flex items-center gap-6 text-xs text-wm-gray">
                            <span>综合成本：<strong class="text-wm-primary font-mono">${p.cost}</strong></span>
                            <span>${p.pros}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }
    if (f.type === 'asset-plan-picker') {
        const plans = [
            { id: 'REITS', title: '类REITs 证券化 · 首期18亿', cost: 'IRR 13.8%', pros: '符合政策 · 直接融资', badge: '推荐', color: '#C9A063' },
            { id: 'ABS', title: 'ABS · 租金现金流15亿', cost: 'IRR 11.2%', pros: '成熟方案', badge: '备选', color: '#0F2A56' },
            { id: 'HOLD', title: '持有型ABS（创新）11亿', cost: 'IRR 14.5%', pros: '2025市场首单', badge: '创新', color: '#B8141A' },
        ];
        return `<div class="wm-form-group">
            <label class="wm-form-label required">${f.label}</label>
            <div class="space-y-3">
                ${plans.map(p => `
                    <div class="wm-option-card plan-option" data-plan="${p.id}" style="display:block;padding:16px;">
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-bold text-wm-secondary">${p.title}</span>
                            <span class="wm-badge" style="background:${p.color}20;color:${p.color};border:1px solid ${p.color}55;">${p.badge}</span>
                        </div>
                        <div class="flex items-center gap-6 text-xs text-wm-gray">
                            <span>回报：<strong class="text-wm-primary font-mono">${p.cost}</strong></span>
                            <span>${p.pros}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }
    if (f.type === 'agent-picker') {
        const agents = [
            '① 产业研究Agent','② 标的画像Agent','③ 信用Agent','④ 估值Agent',
            '⑤ 尽调Agent','⑥ 风险Agent','⑦ 投委会Agent','⑧ 监督Agent'
        ];
        return `<div class="wm-form-group">
            <label class="wm-form-label">${f.label}</label>
            <div class="grid grid-cols-2 gap-2">
                ${agents.map(a => `
                    <div class="wm-option-card multiselect-card selected" data-name="agents" data-value="${a}">
                        <span class="text-sm">${a}</span>
                    </div>
                `).join('')}
            </div>
            <div class="wm-form-help mt-2">默认全选 · 取消即跳过该 Agent（不推荐）</div>
        </div>`;
    }
    // 默认 input
    const inputType = f.type === 'number' ? 'number' : (f.type === 'date' ? 'date' : 'text');
    return `<div class="wm-form-group">
        <label class="wm-form-label ${f.required ? 'required' : ''}">${f.label}</label>
        <input type="${inputType}" class="wm-input" data-field="${f.name}" value="${formData[f.name] || ''}" placeholder="${f.placeholder || ''}">
        ${f.help ? `<div class="wm-form-help">${f.help}</div>` : ''}
    </div>`;
}

// ========= 步骤控制 =========
function updateButtons() {
    document.getElementById('btn-prev').style.display = currentStep > 0 ? '' : 'none';
    document.getElementById('btn-next').textContent = currentStep < config.steps.length - 1 ? '下一步 →' : '🚀 提交申请';
}

document.getElementById('btn-prev').addEventListener('click', () => {
    if (currentStep > 0) { currentStep--; renderSteps(); renderForm(); updateButtons(); }
});

document.getElementById('btn-next').addEventListener('click', async () => {
    // 校验必填项
    const fields = config.fields[currentStep] || [];
    const missing = fields.filter(f => f.required && !formData[f.name]);
    if (missing.length) {
        window.showToast('请填写必填项：' + missing[0].label, 'warn');
        return;
    }

    if (currentStep < config.steps.length - 1) {
        // AI处理步骤模拟
        const nextStepLabel = config.steps[currentStep + 1];
        if (nextStepLabel.includes('AI') || nextStepLabel.includes('智能估值') || nextStepLabel.includes('诊断')) {
            const btn = document.getElementById('btn-next');
            btn.disabled = true;
            btn.textContent = '🤖 AI 处理中…';
            await new Promise(r => setTimeout(r, 1500));
            btn.disabled = false;
            window.showToast('AI 处理完成', 'success');
        }
        currentStep++;
        renderSteps();
        renderForm();
        updateButtons();
    } else {
        // 提交
        const result = window.WM_TICKETS.create(type, formData, {
            title: formData.projectName || formData.assetName || formData.riskEnterprise || formData.targetName || `${user.enterpriseName || '省国资委'} · ${meta.name}`,
            status: 'draft',
            priority: formData.urgency && formData.urgency.includes('紧急') ? 'urgent' : 'normal',
        });

        // 如果指定了审批人，自动提交
        if (formData.approver) {
            window.WM_TICKETS.submit(result.id, formData.approver);
            window.showToast('✓ 已提交审批，即将跳转到单据详情', 'success', 2000);
        } else {
            window.showToast('✓ 草稿已创建', 'success', 2000);
        }

        setTimeout(() => {
            location.href = 'ticket-detail.html?id=' + result.id;
        }, 1500);
    }
});

document.getElementById('btn-draft').addEventListener('click', () => {
    const result = window.WM_TICKETS.create(type, formData, {
        title: formData.projectName || formData.assetName || formData.riskEnterprise || formData.targetName || `[草稿] ${meta.name}`,
        status: 'draft',
    });
    window.showToast('✓ 草稿已保存', 'success');
    setTimeout(() => location.href = 'ticket-detail.html?id=' + result.id, 1000);
});

renderSteps();
renderForm();
updateButtons();
</script>
</body>
</html>
