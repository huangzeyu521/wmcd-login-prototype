<style>
  /* DAG 工作流可视化 */
  .wf-dag-node {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: #FFF;
    border: 1.5px solid var(--color-border);
    border-radius: 6px;
    margin-bottom: 10px;
    transition: all .25s;
    position: relative;
  }
  .wf-dag-node.pending { opacity: .5; }
  .wf-dag-node.running {
    border-color: var(--color-primary);
    background: linear-gradient(90deg, rgba(184,20,26,0.06), rgba(201,160,99,0.04));
    box-shadow: 0 0 0 3px rgba(184,20,26,0.08);
  }
  .wf-dag-node.success {
    border-color: var(--color-success);
    background: rgba(43,147,72,0.05);
  }
  .wf-dag-node.failed {
    border-color: var(--color-danger);
    background: rgba(214,64,69,0.05);
  }
  .wf-dag-node::after {
    content: "";
    position: absolute;
    left: 24px;
    top: 100%;
    width: 2px;
    height: 10px;
    background: var(--color-border);
  }
  .wf-dag-node:last-child::after { display: none; }
  .wf-dag-node.success::after { background: var(--color-success); }
  .wf-dag-ico {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-weight: 700;
    font-size: 14px;
  }
  .wf-dag-node.pending .wf-dag-ico { background: #EEE; color: #999; }
  .wf-dag-node.running .wf-dag-ico { background: var(--color-primary); color: #FFF; animation: wfPulse 1.2s infinite; }
  .wf-dag-node.success .wf-dag-ico { background: var(--color-success); color: #FFF; }
  .wf-dag-node.failed .wf-dag-ico { background: var(--color-danger); color: #FFF; }
  @keyframes wfPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(184,20,26,0.5); }
    50%      { box-shadow: 0 0 0 8px rgba(184,20,26,0); }
  }
  .wf-log-line {
    padding: 6px 10px;
    margin-bottom: 4px;
    font-size: 12px;
    font-family: "JetBrains Mono", "Menlo", Consolas, monospace;
    border-left: 2px solid var(--color-border);
    background: rgba(15,42,86,0.02);
    word-break: break-all;
  }
  .wf-log-line.info    { border-color: var(--color-secondary); color: var(--color-text-2); }
  .wf-log-line.success { border-color: var(--color-success); color: var(--color-success); }
  .wf-log-line.warn    { border-color: var(--color-warning); color: var(--color-warning); }
  .wf-log-line.error   { border-color: var(--color-danger); color: var(--color-danger); }
  .wf-log-time { color: #999; margin-right: 6px; }
  .wf-report {
    font-size: 13px;
    line-height: 1.8;
    color: var(--color-text);
  }
  .wf-report h4 { color: var(--color-primary); font-size: 15px; font-weight: 700; margin: 12px 0 6px; }
  .wf-report ul { padding-left: 20px; margin: 6px 0; }
  .wf-report li { margin-bottom: 3px; }
  .wf-progressbar {
    width: 100%;
    height: 6px;
    background: #EFECE0;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  .wf-progressbar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
    transition: width .3s ease;
  }
  .wf-checkpoint-badge {
    display: inline-block;
    padding: 2px 8px;
    background: rgba(232,163,61,0.15);
    color: var(--color-warning);
    border: 1px solid var(--color-warning);
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 1px;
    margin-left: 8px;
  }
</style>

    let state = {
        currentWorkflow: null,
        runningIdx: -1,
        startTs: 0,
        timerId: null,
        halted: false,
        checkpointResolve: null,
        logs: [],
    };

    // ===== 渲染 DAG =====
    function renderDAG() {
        const wf = state.currentWorkflow;
        const c = document.getElementById('wf-dag-container');
        if (!wf) {
            c.innerHTML = '<div class="text-center text-wm-gray3 text-sm py-12">请选择模板后启动工作流</div>';
            return;
        }
        c.innerHTML = wf.nodes.map((n, i) => {
            const state_ = i < state.runningIdx ? 'success'
                         : i === state.runningIdx ? 'running'
                         : 'pending';
            return `
            <div class="wf-dag-node ${state_}" data-idx="${i}">
                <div class="wf-dag-ico">${state_ === 'success' ? '✓' : state_ === 'running' ? '⋯' : i + 1}</div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-bold text-wm-secondary truncate">${n.name}${n.checkpoint ? '<span class="wf-checkpoint-badge">人工确认</span>' : ''}</div>
                    <div class="text-xs text-wm-gray3 mt-0.5 truncate">${n.desc}</div>
                </div>
                <div class="text-xs text-wm-gray3 font-mono">${n.time.toFixed(1)}s</div>
            </div>`;
        }).join('');
        document.getElementById('wf-node-count').textContent = `${wf.nodes.length} 个节点`;
    }

    function updateProgress() {
        const wf = state.currentWorkflow;
        if (!wf) return;
        const total = wf.nodes.length;
        const done = Math.max(0, state.runningIdx);
        document.getElementById('wf-progress-text').textContent = `${done}/${total}`;
        const pct = total > 0 ? (done / total * 100) : 0;
        document.getElementById('wf-progress-fill').style.width = pct + '%';
        // ETA
        if (state.runningIdx > 0 && state.runningIdx < total) {
            const remainNodes = wf.nodes.slice(state.runningIdx);
            const remainSec = remainNodes.reduce((a, n) => a + n.time, 0);
            document.getElementById('wf-eta').textContent = formatTime(remainSec);
        } else {
            document.getElementById('wf-eta').textContent = state.runningIdx >= total ? '00:00' : '--:--';
        }
    }

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // ===== 日志 =====
    function log(type, msg) {
        const now = new Date();
        const t = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        state.logs.push({ t, type, msg });
        renderLogs();
    }
    function renderLogs() {
        const c = document.getElementById('wf-log-container');
        if (state.logs.length === 0) {
            c.innerHTML = '<div class="text-center text-wm-gray3 text-sm py-12">等待日志输出…</div>';
        } else {
            c.innerHTML = state.logs.map(l =>
                `<div class="wf-log-line ${l.type}"><span class="wf-log-time">${l.t}</span>${window.WM_C.escapeHtml(l.msg)}</div>`
            ).join('');
            c.scrollTop = c.scrollHeight;
        }
        document.getElementById('wf-log-count').textContent = state.logs.length;
    }

<ul><li>🟡 关注：建议对延期应付账款发起专项审计</li><li>🟢 清洁：担保圈与资金池运行正常</li></ul>`
    };
    function streamReport(key) {
        const c = document.getElementById('wf-report-container');
        const full = REPORT_TEMPLATES[key] || '<p>（报告生成中…）</p>';
        c.innerHTML = '';
        return new Promise(resolve => {
            const chunks = full.split(/(?=<)/);  // 按标签切片流式
            let i = 0;
            (function push() {
                if (i >= chunks.length) {
                    document.getElementById('btn-export').removeAttribute('disabled');
                    resolve();
                    return;
                }
                c.innerHTML += chunks[i++];
                c.scrollTop = c.scrollHeight;
                setTimeout(push, 36);
            })();
        });
    }

    // ===== 运行工作流 =====
    async function runWorkflow() {
        const key = document.getElementById('workflow-template').value;
        const tpl = WORKFLOWS[key];
        state.currentWorkflow = JSON.parse(JSON.stringify(tpl));
        state.runningIdx = 0;
        state.logs = [];
        state.halted = false;
        state.startTs = Date.now();
        document.getElementById('wf-status-text').textContent = '运行中';
        document.getElementById('wf-status-light').className = 'wm-light orange wm-pulse';
        document.getElementById('btn-export').setAttribute('disabled', 'disabled');
        document.getElementById('wf-report-container').innerHTML = '<div class="text-center text-wm-gray3 text-sm py-12">⏳ 工作流运行中…</div>';
        renderDAG(); updateProgress();
        log('info', `工作流启动：${tpl.name}`);

        // 计时器
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = setInterval(() => {
            const sec = (Date.now() - state.startTs) / 1000;
            document.getElementById('wf-elapsed').textContent = formatTime(sec);
        }, 200);

        for (let i = 0; i < tpl.nodes.length; i++) {
            if (state.halted) break;
            const node = tpl.nodes[i];
            state.runningIdx = i;
            renderDAG(); updateProgress();
            log('info', `[${node.id}] ${node.name} 启动…`);

            await sleep(node.time * 1000 * 0.3);  // 演示加速

            // 中间日志
            log('info', `  ├─ ${node.desc}`);
            await sleep(node.time * 1000 * 0.3);

            // 人工中断点
            if (node.checkpoint) {
                log('warn', `[${node.id}] 🛑 触发人工决策中断点，等待确认…`);
                showCheckpoint(node);
                await new Promise(resolve => { state.checkpointResolve = resolve; });
                hideCheckpoint();
                if (state.halted) { log('error', '用户驳回，工作流终止'); break; }
                log('success', `[${node.id}] ✓ 用户批准，继续执行`);
            }

            await sleep(node.time * 1000 * 0.4);
            log('success', `[${node.id}] ✓ ${node.name} 完成`);
        }

        clearInterval(state.timerId);

        if (state.halted) {
            state.runningIdx = -1;
            document.getElementById('wf-status-text').textContent = '已终止';
            document.getElementById('wf-status-light').className = 'wm-light red';
            return;
        }

        state.runningIdx = tpl.nodes.length;
        renderDAG(); updateProgress();
        document.getElementById('wf-status-text').textContent = '全部完成';
        document.getElementById('wf-status-light').className = 'wm-light green';
        log('success', `✓ 工作流 ${tpl.name} 全部节点执行完成`);
        log('info', '正在生成综合报告…');
        await streamReport(key);
        log('success', '✓ 综合报告已就绪');
    }

    function showCheckpoint(node) {
        const card = document.getElementById('wf-checkpoint-card');
        document.getElementById('wf-checkpoint-desc').textContent = `节点「${node.name}」需人工确认：${node.desc}`;
        card.style.display = 'block';
    }
    function hideCheckpoint() {
        document.getElementById('wf-checkpoint-card').style.display = 'none';
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ===== 事件 =====
    document.getElementById('btn-start').addEventListener('click', () => {
        if (state.runningIdx >= 0 && state.currentWorkflow && state.runningIdx < state.currentWorkflow.nodes.length) {
            window.showToast('工作流运行中，请先终止', 'warn');
            return;
        }
        runWorkflow();
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
        state.halted = true;
        if (state.checkpointResolve) state.checkpointResolve();
        clearInterval(state.timerId);
        state.currentWorkflow = null;
        state.runningIdx = -1;
        state.logs = [];
        renderDAG(); updateProgress(); renderLogs();
        hideCheckpoint();
        document.getElementById('wf-report-container').innerHTML = '<div class="text-center text-wm-gray3 text-sm py-12">工作流完成后，实时 Markdown 报告将在此处渲染</div>';
        document.getElementById('wf-status-text').textContent = '待启动';
        document.getElementById('wf-status-light').className = 'wm-light green wm-pulse';
        document.getElementById('wf-elapsed').textContent = '00:00';
        document.getElementById('wf-eta').textContent = '--:--';
    });
    document.getElementById('btn-clear-log').addEventListener('click', () => {
        state.logs = []; renderLogs();
    });
    document.getElementById('wf-approve').addEventListener('click', () => {
        if (state.checkpointResolve) state.checkpointResolve();
    });
    document.getElementById('wf-reject').addEventListener('click', () => {
        state.halted = true;
        if (state.checkpointResolve) state.checkpointResolve();
    });
    document.getElementById('btn-export').addEventListener('click', () => {
        window.showToast('PDF 导出中 · 模拟环境仅演示', 'info');
    });

    // 默认渲染一次（空态）
    renderDAG();
})();
</script>
</body>
